<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Manga Store MVP{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- общая шапка сайта -->
    <header class="site-header">
        <div class="container nav">
            <!-- логотип ведет на главную -->
            <a href="/" class="logo">Manga Store</a>
            <nav>
                <!-- общие ссылки -->
                <a href="/">Home</a>
                <a href="/catalog">Catalog</a>
                {% if current_user %}
                    <!-- ссылки после входа -->
                    <a href="/account">Account</a>
                    <a href="/orders">My Orders</a>
                {% else %}
                    <!-- ссылки для гостя -->
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                {% endif %}
                {% if is_manager %}
                    <!-- ссылки менеджера -->
                    <a href="/products/new">Add Manga</a>
                    <a href="/orders/all">All Orders</a>
                {% endif %}
                {% if is_admin %}
                    <!-- ссылка для админа -->
                    <a href="/admin/users">Users</a>
                {% endif %}
                <a href="/docs">API Docs</a>
            </nav>
        </div>
    </header>

    <!-- сюда подставляется страница -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
